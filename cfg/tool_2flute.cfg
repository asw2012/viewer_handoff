# ------------------------------------------------------------
# Geometry inputs only!
# No spline data and no predefined wheel path points!
# ------------------------------------------------------------

# Wheel speed command
wheelSpeedRpm          = 2550.0

# Operation enables (1=enabled, 0=disabled)
enableFlute1           = 1
enableFlute2           = 1
enableOdRelief1        = 1
enableOdRelief2        = 1

# POST-POC: solve/emit flag split for regrind use case.
# When operator wants OD touch-up only (flutes already ground on physical tool):
#   solveFlute1 / solveFlute2  — always 1 when OD relief is active; solver needs the heightmap
#                                to locate the rake face and OD tangent correctly.
#   emitFlute1  / emitFlute2   — set to 0 to suppress flute NC output while keeping solver result.
# OD relief always reads the solved heightmap regardless of emitFlute1/2.
# REQUIRES rake face digitizing (probe/scan of existing ground geometry) before this is useful.
# Do NOT implement until after POC is complete and digitizing is in place.
#
# Example (future):
#   solveFlute1 = 1   # solver needs this to locate rake/OD tangent
#   emitFlute1  = 0   # flute already ground — suppress NC output

# OD/flute independence policy
odFluteDecoupledMode  = 1   # 1: OD relief paths independent of flute start frame; 0: coupled to flute frame
odAttachToFluteStartFrame = 0   # 1: anchor OD start frame to flute start; 0: free/independent (ignored when decoupled)

# Machine-feasibility checks
machineCheckEnable    = 1        # 1: enforce machine limits; 0: skip feasibility checks
machineMaxAStepDeg    = 6.0      # max allowed delta A per move (deg)
machineMaxCStepDeg    = 6.0      # max allowed delta C per move (deg)
machineMaxARateDegMin = 18000.0  # max allowed A-axis rate (deg/min)
machineMaxCRateDegMin = 18000.0  # max allowed C-axis rate (deg/min)

# Flute 1
flute1LengthMm         = 65.0    # flute length
flute1DepthMm          = 2.0     # flute depth
flute1RakeDeg          = 8.0    # rake face angle (deg)
flute1WheelOffsetAngleDeg = 5.0  # wheel offset angle (from helix angle, controls engagement)
flute1HelixFrontDeg    = 40.0    # front helix angle
flute1HelixBackDeg     = 40.0    # back helix angle
flute1FeedMmMin        = 200.0   # feedrate
flute1IndexDeg         = 0.0     # index angle (operator view), default 0
flute1GrindExtFrontMm  = 15.0    # overtravel past blank tip (mm)

# Flute 2
flute2LengthMm         = 65.0    # flute length
flute2DepthMm          = 2.0     # flute depth
flute2RakeDeg          = 8.0    # rake face angle (deg)
flute2WheelOffsetAngleDeg = 5.0  # wheel offset angle (from helix angle, controls engagement)
flute2HelixFrontDeg    = 35.0    # front helix angle
flute2HelixBackDeg     = 35.0    # back helix angle
flute2FeedMmMin        = 120.0   # feedrate
flute2IndexDeg         = 170.0   # index angle relative to flute 1 (operator view), default 180
flute2GrindExtFrontMm  = 15.0    # overtravel past blank tip (mm)

# OD relief target outer diameter (mm) shared default for all OD reliefs (used to derive infeed)
odSizeMm               = 13.995 # cutting diameter

# OD primary relief 1
odRelief1LengthMm          = 65.0
odRelief1FacetAngleDeg     = 80.0
odRelief1FeedMmMin         = 80.0
odRelief1GrindExtFrontMm   = 5.0    # overtravel past blank tip (mm)

# OD primary relief 2
odRelief2LengthMm          = 65.0
odRelief2FacetAngleDeg     = 80.0
odRelief2FeedMmMin         = 80.0
odRelief2GrindExtFrontMm   = 5.0    # overtravel past blank tip (mm)


