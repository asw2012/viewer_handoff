wheelCount = 2

# Y-offset is always positive distance from spindle face; machine moves Y+ to reach wheel grind point.

# Wheel 1 — 11V9 flaring cup (OD relief)
wheel1ODMm           = 110.0
wheel1CornerRadiusMm = 0.2
wheel1YOffsetMm      = 175
wheel1ProfileType    = 11V9
wheel1TaperAngleDeg  = 20.0
wheel1ActiveFaceMm   = 25.0
wheel1GrindSide      = -y

# Wheel 2 — 1A1 straight cylinder (flute grinding)
# Back face (+y, toward back of machine) is the grinding contact face.
# At the grind point (+y): 1mm corner radius, 12mm total width, 10mm diamond depth.
wheel2ODMm           = 125.0
wheel2CornerRadiusMm = 1.0
wheel2YOffsetMm      = 100
wheel2ProfileType    = 1A1
wheel2WidthMm        = 12.0
wheel2ShellThicknessMm = 10.0
wheel2GrindSide      = +y
